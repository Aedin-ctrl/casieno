<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="{{ outerStyle }}">
  <div style="{{ innerStyle }}">
    <div style="{{ contentStyle }}">{{ children }}</div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:220,&quot;height&quot;:120},&quot;bg&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#c0c0c0&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;outlineColor&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#000000&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;bevel&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;padding&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;12px&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;dropShadow&quot;:{&quot;editor&quot;:&quot;number&quot;,&quot;default&quot;:3,&quot;tsType&quot;:&quot;number&quot;},&quot;pixel&quot;:{&quot;editor&quot;:&quot;number&quot;,&quot;default&quot;:4,&quot;tsType&quot;:&quot;number&quot;},&quot;children&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}">
// PIXEL-STEPPED ROUNDED PANEL, adapted from NES.css's proven technique.
// Produces a rectangle whose corners are cut in an 8-bit staircase (not a
// smooth radius, not a diagonal cut) with a real solid outline that
// follows the staircase, plus optional Windows-95-style inset bevel
// highlights and a hard drop-shadow.
//
// TECHNIQUE (the one real pixel-CSS toolkits use):
//   Layer 1: draw the FILL as a plus-sign of two overlapping rectangles
//            (a wide short one + a tall narrow one) using box-shadow's
//            spread parameter to inset the corners by exactly "pixel"
//            pixels. This produces a rectangle with square-notched
//            corners, no border yet.
//   Layer 2: draw the OUTLINE as four thin rectangles hugging each side,
//            plus four tiny corner "stub" pixels stepping in one further.
//            Every step happens at a whole-pixel offset, so the corner
//            reads as a real staircase, not an anti-aliased curve.
//
// The inner div holds this whole illusion; the outermost div carries any
// drop-shadow (which needs to sit outside the clipped area). The content
// div wraps children with padding so text doesn't collide with the
// notched corners.
function buildInnerStyle(bg, outlineColor, bevel, pixel){
  const p = pixel;
  const layers = [];
  // FILL PLUS-SIGN: inset the fill horizontally on the top/bottom row of
  // pixels, and inset it vertically on the left/right column of pixels.
  // Because "inset by p" via negative spread only exists via box-shadow,
  // we use TWO shadows of the fill color offset outward by p, with
  // negative spread p, which yields the vertical+horizontal expansion.
  layers.push('0 ' + (-p) + 'px 0 0 ' + bg);       // top slab
  layers.push('0 ' + p + 'px 0 0 ' + bg);          // bottom slab
  layers.push((-p) + 'px 0 0 0 ' + bg);            // left slab
  layers.push(p + 'px 0 0 0 ' + bg);               // right slab
  // OUTLINE: same four directions but 2p out, in outline color, giving
  // the staircase its final stepped border. Spread of -p keeps them
  // stubby (only p thick), so the corners read as real steps.
  layers.push('0 ' + (-2 * p) + 'px 0 ' + (-p) + 'px ' + outlineColor);
  layers.push('0 ' + (2 * p) + 'px 0 ' + (-p) + 'px ' + outlineColor);
  layers.push((-2 * p) + 'px 0 0 ' + (-p) + 'px ' + outlineColor);
  layers.push((2 * p) + 'px 0 0 ' + (-p) + 'px ' + outlineColor);
  // OUTLINE SIDE-STRIPS: one-pixel-thick strips hugging each straight
  // portion of the edge (spanning the middle, avoiding the corners).
  layers.push('0 ' + (-p) + 'px 0 0 ' + outlineColor);   // sits ON the fill's top slab
  layers.push('0 ' + p + 'px 0 0 ' + outlineColor);      // sits ON the fill's bottom slab
  layers.push((-p) + 'px 0 0 0 ' + outlineColor);        // sits ON the fill's left slab
  layers.push(p + 'px 0 0 0 ' + outlineColor);           // sits ON the fill's right slab

  // Optional inset bevel (thin highlight strips just inside the fill).
  // Purely decorative; disable with bevel:false for flatter looks.
  if(bevel){
    layers.push('inset 0 ' + p + 'px 0 0 rgba(255,255,255,.6)');
    layers.push('inset ' + p + 'px 0 0 0 rgba(255,255,255,.6)');
    layers.push('inset 0 ' + (-p) + 'px 0 0 rgba(0,0,0,.28)');
    layers.push('inset ' + (-p) + 'px 0 0 0 rgba(0,0,0,.28)');
  }
  return 'position:relative;background:' + bg + ';box-shadow:' + layers.join(', ');
}

class Component extends DCLogic {
  renderVals(){
    const bg = this.props.bg || '#c0c0c0';
    const outline = this.props.outlineColor || '#000000';
    const bevel = this.props.bevel !== false;
    const padding = this.props.padding || '12px';
    const drop = typeof this.props.dropShadow === 'number' ? this.props.dropShadow : 3;
    const pixel = Math.max(1, this.props.pixel || 4);

    // Outer wrapper: reserves space for the pixel-outline that sits OUTSIDE
    // the inner box (via non-inset box-shadows), plus room for the drop
    // shadow. Without this margin the outline would visually overflow into
    // adjacent siblings.
    const margin = pixel * 2 + Math.max(drop, 0);
    return {
      outerStyle: 'display:inline-block;padding:' + margin + 'px;box-sizing:border-box',
      innerStyle: buildInnerStyle(bg, outline, bevel, pixel) +
        (drop > 0 ? ',' + drop + 'px ' + drop + 'px 0 ' + (2 * pixel) + 'px ' + outline : ''),
      contentStyle: 'position:relative;padding:' + padding + ';z-index:1'
    };
  }
}

</script>
</body>
</html>
