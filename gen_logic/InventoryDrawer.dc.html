<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

  <!-- DRAWER BACKDROP: full-screen, translucent (not opaque), click closes -->
  <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ handleClose }}" style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:5"></div>
  </sc-if>

  <!-- QUICK SLOTS (attached to the drawer's edge) -->
  <div style="{{ quickSlotsWrapperStyle }}">
    <sc-for list="{{ quickSlots }}" as="q" hint-placeholder-count="3">
      <div onClick="{{ q.onSelect }}" title="{{ q.formattedValue }}" style="position:relative;width:128px;height:128px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 200ms ease" style-hover="transform:translateX(-24px)">
        <sc-if value="{{ q.isEmpty }}" hint-placeholder-val="{{ false }}">
          <div style="width:80px;height:80px;border-radius:50%;border:2px dashed #3a3a3a;background:#241209"></div>
        </sc-if>
        <sc-if value="{{ q.isFilled }}" hint-placeholder-val="{{ false }}">
          <dc-import name="CoinStack" denom="{{ q.value }}" count="{{ q.count }}" selected="{{ q.isSelected }}" size="{{ 90 }}" on-click="{{ q.onSelect }}"></dc-import>
        </sc-if>
      </div>
    </sc-for>
  </div>

  <!-- PERSISTENT DRAWER BAR -->
  <div onClick="{{ toggleDrawer }}" style="position:fixed;right:0;top:0;bottom:0;width:14px;background:#4a2f1a;z-index:6;cursor:pointer"></div>
  <div key="{{ open }}" onClick="{{ toggleDrawer }}" style="position:fixed;right:0;top:80px;width:28px;height:58px;background:#5a3a1e;border-radius:0 0 0 8px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:7;box-shadow:-3px 0 0 #000">
    <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
      <div style="width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:8px solid #d4a017"></div>
    </sc-if>
    <sc-if value="{{ closed }}" hint-placeholder-val="{{ true }}">
      <div style="width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-right:8px solid #d4a017"></div>
    </sc-if>
  </div>

  <!-- DRAWER PANEL -->
  <div key="{{ open }}" onClick="{{ stopProp }}" style="{{ panelStyle }}">
    <div style="font-family:'Press Start 2P',monospace;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#c9a227;margin-bottom:16px">Inventory</div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
      <sc-for list="{{ denomSlots }}" as="d" hint-placeholder-count="8">
        <div onClick="{{ d.onSelect }}" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 6px;border-radius:0;cursor:{{ d.cursor }};background:#3a2418">
          <div title="{{ d.formattedValue }}" style="position:relative;width:88px;height:150px;display:flex;align-items:flex-end;justify-content:center">
            <sc-if value="{{ d.isEmpty }}" hint-placeholder-val="{{ false }}">
              <div style="width:80px;height:80px;border-radius:50%;border:2px dashed #3a3a3a;background:#241209"></div>
            </sc-if>
            <sc-if value="{{ d.inQuickSlot }}" hint-placeholder-val="{{ false }}">
              <div style="font-size:9px;color:#555;text-align:center;line-height:1.3">in quick<br/>slot</div>
            </sc-if>
            <sc-if value="{{ d.showChip }}" hint-placeholder-val="{{ false }}">
              <dc-import name="CoinStack" denom="{{ d.value }}" count="{{ d.count }}" selected="{{ d.isSelected }}"></dc-import>
            </sc-if>
          </div>
          <div style="font-size:12px;color:#aaaaaa;font-weight:600">{{ d.formattedValue }}</div>
          <div style="font-size:10px;color:#666">{{ d.countLabel }}</div>
        </div>
      </sc-for>
    </div>

    <dc-import name="MintMachine" wallet="{{ wallet }}" selected-denom="{{ selectedDenom }}" on-wallet-change="{{ onWalletChange }}" on-deselect="{{ clearSelection }}"></dc-import>

  </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;wallet&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;},&quot;open&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;selectedDenom&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;number|null&quot;},&quot;selectedSource&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string|null&quot;},&quot;onToggle&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onClose&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onSelectDenom&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(denom:number|null, source:string|null) =&gt; void&quot;},&quot;onWalletChange&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(fn:(w:any)=&gt;any) =&gt; void&quot;}}">
// The entire "quick tab + inventory drawer + mint machine" system as one
// portable page. Any screen that wants an inventory just drops in:
//   <dc-import name="InventoryDrawer" wallet="{{...}}" open="{{...}}"
//     selected-denom="{{...}}" selected-source="{{...}}"
//     on-toggle="{{...}}" on-close="{{...}}" on-select-denom="{{...}}"
//     on-wallet-change="{{...}}"></dc-import>
// The PARENT page still owns the actual wallet object + persistence + any
// page-specific selection cleanup (e.g. returning a coin from a game
// table) — this component only ever describes intent via callbacks, so
// there is exactly one place per page where wallet state is written.
const DENOMS = [1, 5, 25, 100, 500, 1000, 5000, 10000];
function formatMoney(v){ return '$' + v.toLocaleString('en-US'); }

function sortedQuickDenoms(wallet){
  const filled = (wallet.quickSlots || []).filter(d => d != null).sort((a,b) => b - a);
  while(filled.length < 3) filled.push(null);
  return filled.slice(0, 3);
}

function assignQuickSlot(wallet, position, denom){
  const sorted = sortedQuickDenoms(wallet);
  const occupying = sorted[position];
  let slots = (wallet.quickSlots || []).filter(d => d !== denom);
  if(occupying != null) slots = slots.filter(d => d !== occupying);
  slots.push(denom);
  wallet.quickSlots = slots.slice(-3);
}

class Component extends DCLogic {
  toggleDrawer = (e) => { if(e && e.stopPropagation) e.stopPropagation(); if(this.props.onToggle) this.props.onToggle(); };
  handleClose = (e) => { if(e && e.stopPropagation) e.stopPropagation(); if(this.props.onClose) this.props.onClose(); };
  stopProp = (e) => { e.stopPropagation(); };
  clearSelection = () => { if(this.props.onSelectDenom) this.props.onSelectDenom(null, null); };

  selectDrawerDenom = (value, selectable) => (e) => {
    e.stopPropagation();
    if(!this.props.onSelectDenom) return;
    if(!selectable){ this.props.onSelectDenom(null, null); return; }
    const already = this.props.selectedSource === 'drawer' && this.props.selectedDenom === value;
    this.props.onSelectDenom(already ? null : value, already ? null : 'drawer');
  };

  onQuickSlotClick = (position) => (e) => {
    e.stopPropagation();
    const wallet = this.props.wallet;
    const sorted = sortedQuickDenoms(wallet);
    const occupying = sorted[position];
    if(this.props.selectedDenom != null){
      const denom = this.props.selectedDenom;
      this.props.onWalletChange((w) => {
        const next = { ...w, quickSlots: [...(w.quickSlots || [])] };
        assignQuickSlot(next, position, denom);
        return next;
      });
      this.clearSelection();
    } else if(occupying != null && (wallet.counts[occupying] || 0) > 0){
      const already = this.props.selectedSource === 'quickSlot' && this.props.selectedDenom === occupying;
      this.props.onSelectDenom(already ? null : occupying, already ? null : 'quickSlot');
    } else {
      this.clearSelection();
    }
  };

  renderVals(){
    const wallet = this.props.wallet || { counts: {}, quickSlots: [] };
    const open = !!this.props.open;
    const selectedDenom = this.props.selectedDenom;
    const selectedSource = this.props.selectedSource;
    const quickSlotDenomSet = new Set((wallet.quickSlots || []).filter(d => d != null));

    const denomSlots = DENOMS.map(value => {
      const count = wallet.counts[value] || 0;
      const inQuickSlot = quickSlotDenomSet.has(value);
      const isSelected = selectedSource === 'drawer' && selectedDenom === value;
      const selectable = !inQuickSlot && count > 0;
      return {
        value, formattedValue: formatMoney(value), count,
        countLabel: inQuickSlot ? '\u2014' : (count + ' coins'),
        isEmpty: !inQuickSlot && count <= 0, inQuickSlot,
        showChip: !inQuickSlot && count > 0,
        isSelected, cursor: selectable ? 'pointer' : 'default',
        onSelect: this.selectDrawerDenom(value, selectable)
      };
    });

    const sortedQ = sortedQuickDenoms(wallet);
    const quickSlots = sortedQ.map((denom, position) => {
      const count = denom != null ? (wallet.counts[denom] || 0) : 0;
      const isSelected = denom != null && selectedSource === 'quickSlot' && selectedDenom === denom;
      return {
        position, value: denom, formattedValue: denom != null ? formatMoney(denom) : 'Empty slot',
        isEmpty: denom == null || count <= 0, isFilled: denom != null && count > 0,
        isSelected, count,
        onSelect: this.onQuickSlotClick(position)
      };
    });

    return {
      wallet, open, closed: !open, selectedDenom,
      denomSlots, quickSlots,
      toggleDrawer: this.toggleDrawer,
      handleClose: this.handleClose,
      stopProp: this.stopProp,
      clearSelection: this.clearSelection,
      onWalletChange: this.props.onWalletChange || (() => {}),
      quickSlotsWrapperStyle: 'position:fixed;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:18px;z-index:7;transition:right 500ms cubic-bezier(.4,0,.2,1);right:' + (open ? '416px' : '-64px'),
      panelStyle: 'position:fixed;top:0;bottom:0;width:480px;background:#2b1810;box-shadow:-5px 0 0 #000;z-index:6;padding:28px 24px;overflow-y:auto;transition:right 500ms cubic-bezier(.4,0,.2,1);right:' + (open ? '0px' : '-480px')
    };
  }
}

</script>
</body>
</html>
