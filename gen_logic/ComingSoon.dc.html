<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @keyframes pixelShimmer{0%,49%{outline-color:#000000}50%,100%{outline-color:#ffffff}}
    *{box-sizing:border-box}
    body{margin:0}
    @keyframes pulseSoft{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
  </style>
</helmet>
<div data-screen-label="Coming Soon" style="height:100vh;width:100%;background:#7b7b7b;color:#000000;font-family:'VT323',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px">
  <dc-import name="Coin" denom="{{ 100 }}" selected="{{ true }}" size="{{ 88 }}"></dc-import>
  <div style="font-family:'Press Start 2P',monospace;font-size:20px;line-height:1.7;text-align:center;text-shadow:3px 3px 0 #000;color:#404040">{{ gameName }}<br/>IS COMING SOON</div>
  <div style="font-size:20px;color:#4a4a4a;text-align:center;max-width:420px;line-height:1.6">This table hasn't been built yet. Your coins are safe back on the home page.</div>
  <a href="Home.dc.html" style="margin-top:12px;background:#c0c0c0;color:#1a1a1a;font-family:'Press Start 2P',monospace;font-size:12px;padding:14px 22px;border:3px solid #1a1a1a;clip-path:polygon(8% 0,92% 0,100% 8%,100% 92%,92% 100%,8% 100%,0 92%,0 8%);box-shadow:inset 1px 1px 0 #fff,inset -1px -1px 0 #808080,4px 4px 0 #000;text-decoration:none;transition:transform 150ms ease" style-hover="transform:scale(1.05);outline:2px solid #000;outline-offset:2px;animation:pixelShimmer .5s steps(2,jump-none) infinite">BACK TO CASINO</a>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { gameName: 'This game' };

  componentDidMount(){
    try {
      const params = new URLSearchParams(window.location.search);
      const g = params.get('game');
      if(g) this.setState({ gameName: g });
    } catch(e) {}
  }

  renderVals(){
    return { gameName: this.state.gameName };
  }
}

</script>
</body>
</html>
