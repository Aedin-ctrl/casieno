<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="margin-top:22px;padding:16px;border-radius:0;background:#d4d4d4">
  <div style="font-family:'Press Start 2P',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#808080;text-align:center;margin-bottom:16px">Mint / Exchange Machine</div>
  <div style="display:flex;align-items:center;gap:10px">

    <div onClick="{{ leftBox.containerClick }}" style="flex:1;min-height:120px;border-radius:0;background:#ffffff;border:2px {{ leftBox.borderStyle }};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px;cursor:{{ leftBox.cursor }};position:relative">
      <sc-if value="{{ leftBox.empty }}" hint-placeholder-val="{{ true }}">
        <div style="font-size:11px;color:#666;text-align:center;padding:0 8px">{{ leftBox.emptyText }}</div>
      </sc-if>
      <sc-if value="{{ leftBox.filled }}" hint-placeholder-val="{{ false }}">
        <dc-import name="CoinStack" denom="{{ leftBox.denom }}" count="{{ leftBox.count }}" selected="{{ false }}"></dc-import>
        <div style="font-size:11px;color:#404040;font-weight:600">{{ leftBox.label }}</div>
        <div style="font-size:9px;color:#888">{{ leftBox.subText }}</div>
      </sc-if>
    </div>

    <div style="font-size:18px;color:#555;font-weight:700">&#8594;</div>

    <div style="flex:1;min-height:120px;border-radius:0;background:#ffffff;border:2px {{ rightBox.borderStyle }};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:12px">
      <sc-if value="{{ rightBox.empty }}" hint-placeholder-val="{{ true }}">
        <div style="font-size:11px;color:#666;text-align:center;padding:0 8px">{{ rightBox.emptyText }}</div>
      </sc-if>
      <sc-if value="{{ rightBox.hasUp }}" hint-placeholder-val="{{ false }}">
        <div onClick="{{ rightBox.onUpClick }}" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer">
          <dc-import name="Coin" denom="{{ rightBox.upDenom }}" selected="{{ false }}" size="{{ 72 }}"></dc-import>
          <div style="font-size:11px;color:#404040;font-weight:700">{{ rightBox.upLabel }}</div>
          <div style="font-size:9px;color:#888">tap to collect</div>
        </div>
      </sc-if>
      <sc-if value="{{ rightBox.hasDown }}" hint-placeholder-val="{{ false }}">
        <div onClick="{{ rightBox.onDownClick }}" style="font-size:10px;color:#666;text-align:center;padding:6px 8px;cursor:pointer;border-top:1px solid #ccc;margin-top:4px">{{ rightBox.downText }}</div>
      </sc-if>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:480,&quot;height&quot;:200},&quot;wallet&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;},&quot;selectedDenom&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;number|null&quot;},&quot;onWalletChange&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(fn:(w:any)=&gt;any) =&gt; void&quot;},&quot;onDeselect&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
// PILE MODEL: wallet.mintInput = { denom, count } -- a running pile of ONE
// denomination, built one coin at a time. Select a coin elsewhere, click
// the left box to add exactly one unit to the pile. The right box always
// shows the biggest single coin the CURRENT pile can make (floor
// division) -- clicking it consumes exactly that batch, leaving any
// remainder sitting in the pile on the left. Clicking the left box with
// nothing selected recollects the leftover pile back into your wallet.
const DENOMS = [1, 5, 25, 100, 500, 1000, 5000, 10000];
function formatMoney(v){ return '$' + v.toLocaleString('en-US'); }
function ratioUp(idx){ return DENOMS[idx+1] / DENOMS[idx]; }
function ratioDown(idx){ return DENOMS[idx] / DENOMS[idx-1]; }

class Component extends DCLogic {
  addOne(e){
    if(e && e.stopPropagation) e.stopPropagation();
    const selectedDenom = this.props.selectedDenom;
    if(selectedDenom == null) return;
    this.props.onWalletChange((wallet) => {
      const pile = wallet.mintInput;
      if(pile && pile.denom !== selectedDenom) return wallet; // finish/collect current pile first
      if((wallet.counts[selectedDenom] || 0) <= 0) return wallet;
      const next = { ...wallet, counts: { ...wallet.counts } };
      next.counts[selectedDenom] -= 1;
      next.mintInput = { denom: selectedDenom, count: (pile ? pile.count : 0) + 1 };
      return next;
    });
    if(this.props.onDeselect) this.props.onDeselect();
  }

  recollect(e){
    if(e && e.stopPropagation) e.stopPropagation();
    this.props.onWalletChange((wallet) => {
      if(!wallet.mintInput) return wallet;
      const next = { ...wallet, counts: { ...wallet.counts } };
      next.counts[wallet.mintInput.denom] = (next.counts[wallet.mintInput.denom] || 0) + wallet.mintInput.count;
      next.mintInput = null;
      return next;
    });
  }

  convertUp(e){
    if(e && e.stopPropagation) e.stopPropagation();
    this.props.onWalletChange((wallet) => {
      const pile = wallet.mintInput;
      if(!pile) return wallet;
      const idx = DENOMS.indexOf(pile.denom);
      if(idx >= DENOMS.length - 1) return wallet;
      const need = ratioUp(idx);
      if(pile.count < need) return wallet;
      const toDenom = DENOMS[idx + 1];
      const next = { ...wallet, counts: { ...wallet.counts } };
      next.counts[toDenom] = (next.counts[toDenom] || 0) + 1;
      const remaining = pile.count - need;
      next.mintInput = remaining > 0 ? { denom: pile.denom, count: remaining } : null;
      next.history = [{
        id: Date.now() + '-' + Math.random().toString(36).slice(2),
        description: 'Minted ' + need + '\u00d7 ' + formatMoney(pile.denom) + ' \u2192 1\u00d7 ' + formatMoney(toDenom),
        timestamp: Date.now()
      }, ...(wallet.history || [])].slice(0, 300);
      return next;
    });
  }

  convertDown(e){
    if(e && e.stopPropagation) e.stopPropagation();
    this.props.onWalletChange((wallet) => {
      const pile = wallet.mintInput;
      if(!pile) return wallet;
      const idx = DENOMS.indexOf(pile.denom);
      if(idx <= 0 || pile.count < 1) return wallet;
      const toDenom = DENOMS[idx - 1];
      const produced = ratioDown(idx);
      const next = { ...wallet, counts: { ...wallet.counts } };
      next.counts[toDenom] = (next.counts[toDenom] || 0) + produced;
      const remaining = pile.count - 1;
      next.mintInput = remaining > 0 ? { denom: pile.denom, count: remaining } : null;
      next.history = [{
        id: Date.now() + '-' + Math.random().toString(36).slice(2),
        description: 'Broke 1\u00d7 ' + formatMoney(pile.denom) + ' \u2192 ' + produced + '\u00d7 ' + formatMoney(toDenom),
        timestamp: Date.now()
      }, ...(wallet.history || [])].slice(0, 300);
      return next;
    });
  }

  renderVals(){
    const wallet = this.props.wallet || { counts: {}, mintInput: null, history: [] };
    const pile = wallet.mintInput;
    const selectedDenom = this.props.selectedDenom;

    let leftBox;
    if(pile){
      leftBox = {
        empty: false, filled: true, denom: pile.denom, count: pile.count,
        label: pile.count + '\u00d7 ' + formatMoney(pile.denom),
        subText: selectedDenom === pile.denom ? 'tap to add one more' : 'tap to recollect',
        containerClick: (e) => { if(selectedDenom === pile.denom) this.addOne(e); else this.recollect(e); },
        cursor: 'pointer', borderStyle: 'solid #404040'
      };
    } else {
      leftBox = {
        empty: true, filled: false,
        emptyText: selectedDenom != null ? 'Tap here to add ' + formatMoney(selectedDenom) : 'Select a coin, then tap here to add it',
        containerClick: selectedDenom != null ? ((e) => this.addOne(e)) : (() => {}),
        cursor: selectedDenom != null ? 'pointer' : 'default', borderStyle: 'dashed #999'
      };
    }

    let rightBox;
    if(!pile){
      rightBox = { empty: true, hasUp: false, hasDown: false, emptyText: 'Add coins on the left first', borderStyle: 'dashed #999' };
    } else {
      const idx = DENOMS.indexOf(pile.denom);
      const need = idx < DENOMS.length - 1 ? ratioUp(idx) : null;
      const canUp = need != null && pile.count >= need;
      const canDown = idx > 0 && pile.count >= 1;
      rightBox = {
        empty: !canUp && !canDown,
        emptyText: 'Need ' + (need != null ? need : '?') + '\u00d7 ' + formatMoney(pile.denom) + ' to mint up',
        hasUp: canUp,
        upDenom: canUp ? DENOMS[idx + 1] : null,
        upLabel: canUp ? ('1\u00d7 ' + formatMoney(DENOMS[idx + 1])) : '',
        onUpClick: (e) => this.convertUp(e),
        hasDown: canDown,
        downText: canDown ? ('or break 1 down \u2192 ' + ratioDown(idx) + '\u00d7 ' + formatMoney(DENOMS[idx - 1])) : '',
        onDownClick: (e) => this.convertDown(e),
        borderStyle: canUp ? 'solid #404040' : 'dashed #999'
      };
    }

    return { leftBox, rightBox };
  }
}

</script>
</body>
</html>
