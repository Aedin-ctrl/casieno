<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    @keyframes pixelShimmer{0%,49%{outline-color:#000000}50%,100%{outline-color:#ffffff}}
    *{box-sizing:border-box}
    @keyframes coinGlowPulse{0%,100%{outline-color:rgba(255,255,255,.7)}50%{outline-color:rgba(255,255,255,1)}}
  </style>
</helmet>
<div style="position:relative;width:100%;max-width:900px;background:#c0c0c0;border:6px solid #1a1a1a;box-shadow:inset 2px 2px 0 #fff,inset -2px -2px 0 #808080,0 0 0 4px #808080,0 0 0 10px #1a1a1a,5px 5px 0 #000;padding:32px;display:flex;align-items:center;gap:24px">

  <div onClick="{{ onClear }}" style="flex:none;background:{{ clearBg }};color:{{ clearColor }};font-family:'Press Start 2P',monospace;font-size:11px;padding:14px 18px;border:3px solid #1a1a1a;cursor:{{ clearCursor }};transition:transform 150ms ease;white-space:nowrap" style-hover="transform:scale(1.04);outline:2px solid #000;outline-offset:2px;animation:pixelShimmer .5s steps(2,jump-none) infinite">CLEAR</div>

  <div onClick="{{ onTableClick }}" style="flex:1;min-height:220px;border:3px solid #1a1a1a;background:{{ surfaceBg }};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px;transform:{{ trapdoorTransform }};opacity:{{ trapdoorOpacity }};transition:transform 500ms ease-in-out,opacity 500ms ease-in-out">

    <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ true }}">
      <div style="font-size:14px;color:#666">No coins on the table</div>
    </sc-if>

    <sc-if value="{{ hasBackRow }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;gap:44px;align-items:flex-end;justify-content:center">
        <sc-for list="{{ backRow }}" as="p" hint-placeholder-count="4">
          <div onClick="{{ p.onClick }}" style="cursor:pointer">
            <dc-import name="CoinStack" denom="{{ p.denom }}" count="{{ p.count }}" selected="{{ p.isSelected }}"></dc-import>
          </div>
        </sc-for>
      </div>
    </sc-if>

    <sc-if value="{{ hasFrontRow }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;gap:44px;align-items:flex-end;justify-content:center">
        <sc-for list="{{ frontRow }}" as="p" hint-placeholder-count="4">
          <div onClick="{{ p.onClick }}" style="cursor:pointer">
            <dc-import name="CoinStack" denom="{{ p.denom }}" count="{{ p.count }}" selected="{{ p.isSelected }}"></dc-import>
          </div>
        </sc-for>
      </div>
    </sc-if>
  </div>

  <div style="flex:none;text-align:right">
    <div style="font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#808080;margin-bottom:6px">Total Bet</div>
    <div style="font-size:22px;font-weight:800;color:#404040">{{ betTotalFormatted }}</div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:300},&quot;piles&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;Array&lt;{denom:number,count:number}&gt;&quot;},&quot;betTotalFormatted&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;$0&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onClear&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onTableClick&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onPileClick&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(denom:number) =&gt; void&quot;},&quot;selectedTableDenom&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;number|null&quot;},&quot;locked&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;trapdoorState&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;up&quot;,&quot;options&quot;:[&quot;up&quot;,&quot;down&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
function formatMoney(v){ return '$' + v.toLocaleString('en-US'); }

class Component extends DCLogic {
  renderVals(){
    const piles = (this.props.piles || []).filter(p => p.count > 0).sort((a,b) => a.denom - b.denom);
    const locked = !!this.props.locked;
    const onPileClick = this.props.onPileClick || (() => {});
    const selectedDenom = this.props.selectedTableDenom;

    const built = piles.map(p => ({
      denom: p.denom, count: p.count, isSelected: selectedDenom === p.denom,
      onClick: locked ? (() => {}) : ((e) => { if(e && e.stopPropagation) e.stopPropagation(); onPileClick(p.denom); })
    }));
    const backRow = built.slice(0, 4);
    const frontRow = built.slice(4, 8);

    return {
      backRow, frontRow,
      hasBackRow: backRow.length > 0,
      hasFrontRow: frontRow.length > 0,
      isEmpty: built.length === 0,
      betTotalFormatted: this.props.betTotalFormatted || '$0',
      onClear: locked ? (() => {}) : (this.props.onClear || (() => {})),
      onTableClick: locked ? (() => {}) : (this.props.onTableClick || (() => {})),
      clearBg: locked || built.length === 0 ? '#2a2a2a' : '#404040',
      clearColor: locked || built.length === 0 ? '#777' : '#7b7b7b',
      clearCursor: locked || built.length === 0 ? 'default' : 'pointer',
      surfaceBg: this.props.surfaceBg || '#0a5c36',
      trapdoorTransform: this.props.trapdoorState === 'down' ? 'translateY(40px)' : 'translateY(0)',
      trapdoorOpacity: this.props.trapdoorState === 'down' ? 0 : 1
    };
  }
}

</script>
</body>
</html>
