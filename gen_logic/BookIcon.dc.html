<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="line-height:0;display:inline-block">
  <sc-for list="{{ grid }}" as="row" hint-placeholder-count="10">
    <div style="display:flex;">
      <sc-for list="{{ row }}" as="c" hint-placeholder-count="12">
        <div style="width:{{ cellPx }}px;height:{{ cellPx }}px;background:{{ c }};flex:none;"></div>
      </sc-for>
    </div>
  </sc-for>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:60,&quot;height&quot;:60},&quot;color&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#404040&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;size&quot;:{&quot;editor&quot;:&quot;number&quot;,&quot;default&quot;:44,&quot;tsType&quot;:&quot;number&quot;}}">
// Hand-authored pixel bitmap, same technique as Coin.dc.html and the
// design reference sheet: a string per row, '#' = ink, '.' = transparent.
// A closed book viewed face-on, spine line near the left edge.
const BOOK_BITMAP = [
  '.##########.',
  '#............#',
  '#.#..........#',
  '#.#..........#',
  '#.#....##....#',
  '#.#...#..#...#',
  '#.#....##....#',
  '#.#..........#',
  '#............#',
  '.##########.'
];

function buildGrid(bitmap, color){
  return bitmap.map(row => row.split('').map(ch => ch === '#' ? color : 'transparent'));
}

class Component extends DCLogic {
  renderVals(){
    const color = this.props.color || '#404040';
    const size = this.props.size || 44;
    const cols = BOOK_BITMAP[0].length;
    const cellPx = Math.max(1, Math.round(size / cols));
    return { grid: buildGrid(BOOK_BITMAP, color), cellPx };
  }
}

</script>
</body>
</html>
