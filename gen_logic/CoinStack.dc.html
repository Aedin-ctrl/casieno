<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div onClick="{{ containerClick }}" style="position:relative;width:{{ width }}px;height:{{ height }}px;cursor:{{ cursor }}">
  <sc-if value="{{ hasBadge }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;top:-4px;right:-2px;background:#d4a017;color:#1f0d10;font-size:10px;font-weight:800;border-radius:0;padding:1px 5px;z-index:20">{{ badgeText }}</div>
  </sc-if>
  <sc-for list="{{ cells }}" as="c" hint-placeholder-count="4">
    <sc-if value="{{ c.filled }}" hint-placeholder-val="{{ false }}">
      <dc-import name="Coin" denom="{{ c.denom }}" selected="{{ c.selected }}" size="{{ c.size }}" style="position:absolute;left:0;bottom:{{ c.bottom }}px;z-index:{{ c.z }}"></dc-import>
    </sc-if>
  </sc-for>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:120,&quot;height&quot;:160},&quot;denom&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;number&quot;},&quot;count&quot;:{&quot;editor&quot;:&quot;number&quot;,&quot;default&quot;:1,&quot;tsType&quot;:&quot;number&quot;},&quot;selected&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;size&quot;:{&quot;editor&quot;:&quot;number&quot;,&quot;default&quot;:80,&quot;tsType&quot;:&quot;number&quot;},&quot;onClick&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
// Stacking rule lives ONE place: up to 4 coin faces visible, tightly
// overlapped so only each coin's rim peeks out below the one above it;
// beyond 4, the count freezes visually and a x-N badge takes over.
const DEFAULT_SIZE = 80;

class Component extends DCLogic {
  renderVals(){
    const size = this.props.size || DEFAULT_SIZE;
    const OFFSET_BY_COUNT = { 1: 0, 2: Math.round(size*0.3), 3: Math.round(size*0.25), 4: Math.round(size*0.2) };
    const count = this.props.count || 0;
    const visible = Math.min(Math.max(count, 0), 4);
    const offset = OFFSET_BY_COUNT[visible] || 0;
    const denom = this.props.denom;
    const selected = !!this.props.selected;

    const cells = [];
    for(let i = 0; i < 4; i++){
      if(i >= visible){ cells.push({ filled: false }); continue; }
      const isTop = i === visible - 1;
      cells.push({ filled: true, denom, selected: isTop && selected, bottom: i * offset, z: i + 1, size });
    }

    const height = visible > 0 ? size + (visible - 1) * offset : size;

    return {
      width: size, height,
      hasBadge: count > 4, badgeText: count > 4 ? ('\u00d7' + count) : '',
      cells,
      containerClick: this.props.onClick || (() => {}),
      cursor: this.props.onClick ? 'pointer' : 'default'
    };
  }
}

</script>
</body>
</html>
