<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    *{box-sizing:border-box}
    @keyframes coinGlowPulse{0%,100%{box-shadow:0 0 0 3px rgba(255,255,255,.85),0 0 14px 4px rgba(255,255,255,.4)}50%{box-shadow:0 0 0 3px rgba(255,255,255,1),0 0 20px 8px rgba(255,255,255,.65)}}
  </style>
</helmet>
<div style="position:relative;width:100%;max-width:900px;background:#202020;border-radius:8px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05),0 4px 24px rgba(0,0,0,.4);padding:32px;display:flex;align-items:center;gap:24px">

  <div onClick="{{ onClear }}" style="flex:none;background:{{ clearBg }};color:{{ clearColor }};font-size:14px;font-weight:700;padding:12px 20px;border-radius:8px;cursor:{{ clearCursor }};transition:transform 150ms ease;white-space:nowrap" style-hover="transform:scale(1.04)">Clear Table</div>

  <div onClick="{{ onTableClick }}" style="flex:1;min-height:220px;border-radius:8px;background:{{ surfaceBg }};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px;transform:{{ trapdoorTransform }};opacity:{{ trapdoorOpacity }};transition:transform 500ms ease-in-out,opacity 500ms ease-in-out">

    <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ true }}">
      <div style="font-size:14px;color:#666">No coins on the table</div>
    </sc-if>

    <sc-if value="{{ hasBackRow }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;gap:28px;align-items:flex-end;justify-content:center">
        <sc-for list="{{ backRow }}" as="p" hint-placeholder-count="4">
          <div onClick="{{ p.onClick }}" title="{{ p.formattedValue }}" style="position:relative;width:44px;height:76px;display:flex;align-items:flex-end;justify-content:center;cursor:pointer">
            <sc-if value="{{ p.hasBadge }}" hint-placeholder-val="{{ false }}">
              <div style="position:absolute;top:-4px;right:-2px;background:#d4af37;color:#1a1a1a;font-size:10px;font-weight:800;border-radius:8px;padding:1px 5px;z-index:20">{{ p.badgeText }}</div>
            </sc-if>
            <sc-if value="{{ p.chip.c0.filled }}" hint-placeholder-val="{{ false }}"><div key="{{ p.chip.c0.cellKey }}" style="{{ p.chip.c0.coinStyle }}"></div></sc-if>
            <sc-if value="{{ p.chip.c1.filled }}" hint-placeholder-val="{{ false }}"><div key="{{ p.chip.c1.cellKey }}" style="{{ p.chip.c1.coinStyle }}"></div></sc-if>
            <sc-if value="{{ p.chip.c2.filled }}" hint-placeholder-val="{{ false }}"><div key="{{ p.chip.c2.cellKey }}" style="{{ p.chip.c2.coinStyle }}"></div></sc-if>
            <sc-if value="{{ p.chip.c3.filled }}" hint-placeholder-val="{{ false }}"><div key="{{ p.chip.c3.cellKey }}" style="{{ p.chip.c3.coinStyle }}"></div></sc-if>
          </div>
        </sc-for>
      </div>
    </sc-if>

    <sc-if value="{{ hasFrontRow }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;gap:28px;align-items:flex-end;justify-content:center">
        <sc-for list="{{ frontRow }}" as="p" hint-placeholder-count="4">
          <div onClick="{{ p.onClick }}" title="{{ p.formattedValue }}" style="position:relative;width:44px;height:76px;display:flex;align-items:flex-end;justify-content:center;cursor:pointer">
            <sc-if value="{{ p.hasBadge }}" hint-placeholder-val="{{ false }}">
              <div style="position:absolute;top:-4px;right:-2px;background:#d4af37;color:#1a1a1a;font-size:10px;font-weight:800;border-radius:8px;padding:1px 5px;z-index:20">{{ p.badgeText }}</div>
            </sc-if>
            <sc-if value="{{ p.chip.c0.filled }}" hint-placeholder-val="{{ false }}"><div key="{{ p.chip.c0.cellKey }}" style="{{ p.chip.c0.coinStyle }}"></div></sc-if>
            <sc-if value="{{ p.chip.c1.filled }}" hint-placeholder-val="{{ false }}"><div key="{{ p.chip.c1.cellKey }}" style="{{ p.chip.c1.coinStyle }}"></div></sc-if>
            <sc-if value="{{ p.chip.c2.filled }}" hint-placeholder-val="{{ false }}"><div key="{{ p.chip.c2.cellKey }}" style="{{ p.chip.c2.coinStyle }}"></div></sc-if>
            <sc-if value="{{ p.chip.c3.filled }}" hint-placeholder-val="{{ false }}"><div key="{{ p.chip.c3.cellKey }}" style="{{ p.chip.c3.coinStyle }}"></div></sc-if>
          </div>
        </sc-for>
      </div>
    </sc-if>
  </div>

  <div style="flex:none;text-align:right">
    <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#8a8a8a;margin-bottom:4px">Total Bet</div>
    <div style="font-size:22px;font-weight:800;color:#d4af37">{{ betTotalFormatted }}</div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:300},&quot;piles&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;Array&lt;{denom:number,count:number}&gt;&quot;},&quot;betTotalFormatted&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;$0&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onClear&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onTableClick&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onPileClick&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(denom:number) =&gt; void&quot;},&quot;selectedTableDenom&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;number|null&quot;},&quot;locked&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;trapdoorState&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;up&quot;,&quot;options&quot;:[&quot;up&quot;,&quot;down&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
const COLORS = {1:'#b87333',5:'#8c7853',25:'#c0c0c0',100:'#d4af37',500:'#50c878',1000:'#0f52ba',5000:'#e0115f',10000:'#e8e8e8'};

function formatMoney(v){ return '$' + v.toLocaleString('en-US'); }

const CHIP_D = 40;
const OFFSET_BY_COUNT = { 1: 0, 2: 12, 3: 10, 4: 8 };

function coinDivStyle(color, bottom, z, glow){
  return 'position:absolute;left:0;bottom:' + bottom + 'px;width:' + CHIP_D + 'px;height:' + CHIP_D + 'px;border-radius:50%;background:' + color + ';box-shadow:inset 0 -6px 8px rgba(0,0,0,.35),inset 0 2px 3px rgba(255,255,255,.25)' + (glow ? ',0 0 0 3px rgba(255,255,255,.9),0 0 16px 6px rgba(255,255,255,.55)' : '') + ';z-index:' + z + (glow ? ';animation:coinGlowPulse 1.6s ease-in-out infinite' : '');
}

function buildChipCells(count, color, isSelected){
  const visible = Math.min(Math.max(count, 0), 4);
  const offset = OFFSET_BY_COUNT[visible] || 0;
  const keys = ['c0','c1','c2','c3'];
  const cells = {};
  for(let i = 0; i < 4; i++){
    if(i >= visible){ cells[keys[i]] = { filled: false }; continue; }
    const bottom = i * offset;
    const isTop = i === visible - 1;
    cells[keys[i]] = {
      filled: true,
      cellKey: i + '-' + count + '-' + color,
      coinStyle: coinDivStyle(color, bottom, i + 1, isTop && isSelected)
    };
  }
  return cells;
}

class Component extends DCLogic {
  renderVals(){
    const piles = (this.props.piles || []).filter(p => p.count > 0).sort((a,b) => a.denom - b.denom);
    const locked = !!this.props.locked;
    const onPileClick = this.props.onPileClick || (() => {});
    const selectedDenom = this.props.selectedTableDenom;

    const built = piles.map(p => ({
      denom: p.denom, formattedValue: formatMoney(p.denom), count: p.count,
      chip: buildChipCells(p.count, COLORS[p.denom] || '#d4af37', selectedDenom === p.denom),
      hasBadge: p.count > 4, badgeText: p.count > 4 ? ('\u00d7' + p.count) : '',
      onClick: locked ? (() => {}) : ((e) => { if(e && e.stopPropagation) e.stopPropagation(); onPileClick(p.denom); })
    }));
    const backRow = built.slice(0, 4);
    const frontRow = built.slice(4, 8);

    return {
      backRow, frontRow,
      hasBackRow: backRow.length > 0,
      hasFrontRow: frontRow.length > 0,
      isEmpty: built.length === 0,
      betTotalFormatted: this.props.betTotalFormatted || '$0',
      onClear: locked ? (() => {}) : (this.props.onClear || (() => {})),
      onTableClick: locked ? (() => {}) : (this.props.onTableClick || (() => {})),
      clearBg: locked || built.length === 0 ? '#2a2a2a' : '#d4af37',
      clearColor: locked || built.length === 0 ? '#777' : '#1a1a1a',
      clearCursor: locked || built.length === 0 ? 'default' : 'pointer',
      surfaceBg: this.props.surfaceBg || '#181818',
      trapdoorTransform: this.props.trapdoorState === 'down' ? 'translateY(40px)' : 'translateY(0)',
      trapdoorOpacity: this.props.trapdoorState === 'down' ? 0 : 1
    };
  }
}

</script>
</body>
</html>
