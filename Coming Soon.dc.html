<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *{box-sizing:border-box}
    body{margin:0}
    @keyframes pulseSoft{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
  </style>
</helmet>
<div data-screen-label="Coming Soon" style="height:100vh;width:100%;background:#1a1a1a;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px">
  <div style="width:88px;height:88px;border-radius:50%;background:#242424;box-shadow:inset 0 0 0 2px #d4af37;display:flex;align-items:center;justify-content:center;animation:pulseSoft 2.6s cubic-bezier(0.34,1.56,0.64,1) infinite">
    <div style="width:34px;height:34px;border-radius:50%;background:#d4af37"></div>
  </div>
  <div style="font-size:34px;font-weight:800;text-align:center">{{ gameName }} is coming soon</div>
  <div style="font-size:16px;color:#999;text-align:center;max-width:420px;line-height:1.6">This table hasn't been built yet. Your coins are safe back on the home page.</div>
  <a href="Home.dc.html" style="margin-top:12px;background:#d4af37;color:#1a1a1a;font-size:15px;font-weight:700;padding:12px 24px;border-radius:8px;text-decoration:none;transition:transform 150ms ease" style-hover="transform:scale(1.05)">Back to Casino</a>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { gameName: 'This game' };

  componentDidMount(){
    try {
      const params = new URLSearchParams(window.location.search);
      const g = params.get('game');
      if(g) this.setState({ gameName: g });
    } catch(e) {}
  }

  renderVals(){
    return { gameName: this.state.gameName };
  }
}

</script>
</body>
</html>
